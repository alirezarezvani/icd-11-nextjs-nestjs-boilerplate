# {{ORGANIZATION_NAME}} ICD-11 Healthcare Application
# GitLab CI/CD Pipeline
# Generated by create-icd11-app

# Global configuration
default:
  image: node:18-alpine
  
# Cache configuration for faster builds  
cache:
  paths:
    - node_modules/
    - packages/*/node_modules/
    - .npm/

# Build stages
stages:
  - install
  - test
  - security
  - build
{{#if_deployment_docker}}
  - containerize
{{/if_deployment_docker}}
  - deploy
  - notify

# Environment variables
variables:
  NODE_VERSION: "18"
  ORGANIZATION_NAME: "{{ORGANIZATION_NAME}}"
  PROJECT_NAME: "{{PROJECT_NAME}}"
  PRIMARY_COLOR: "{{PRIMARY_COLOR}}"
  SECONDARY_COLOR: "{{SECONDARY_COLOR}}"
  DEPLOYMENT_PROVIDER: "{{DEPLOYMENT_PROVIDER}}"
  
# Service dependencies
{{#if_includes_redis}}
services:
  - name: redis:7-alpine
    alias: redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
{{/if_includes_redis}}

# Install dependencies
install_dependencies:
  stage: install
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run install:workspaces
  artifacts:
    paths:
      - node_modules/
      - packages/*/node_modules/
    expire_in: 1 hour
  only:
    - main
    - develop
    - merge_requests

# Run tests
test_suite:
  stage: test
  dependencies:
    - install_dependencies
  script:
{{#if_includes_backend}}
    # Backend tests
    - cd packages/backend
    - npm run test
    - npm run test:e2e
    - cd ../..
{{/if_includes_backend}}
{{#if_includes_frontend}}
    # Frontend tests
    - cd packages/frontend  
    - npm run test
    - npm run type-check
    - cd ../..
{{/if_includes_frontend}}
    # Lint all packages
    - npm run lint
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: packages/*/coverage/cobertura-coverage.xml
    paths:
      - packages/*/coverage/
    expire_in: 1 week
  environment:
    variables:
      NODE_ENV: test
{{#if_includes_redis}}
      REDIS_HOST: redis
      REDIS_PORT: 6379
{{/if_includes_redis}}
{{#if_who_credentials}}
      ICD11_CLIENT_ID: $TEST_ICD11_CLIENT_ID
      ICD11_CLIENT_SECRET: $TEST_ICD11_CLIENT_SECRET
{{/if_who_credentials}}
  only:
    - main
    - develop
    - merge_requests

# Security audit
security_audit:
  stage: security
  dependencies:
    - install_dependencies
  script:
    # NPM security audit
    - npm audit --audit-level moderate
    
    # Additional security scanning (if available)
    - |
      if command -v semgrep &> /dev/null; then
        semgrep --config=auto packages/
      fi
      
    # License compliance check
    - npx license-checker --summary
  artifacts:
    reports:
      security: gl-security-report.json
    paths:
      - gl-security-report.json
    expire_in: 1 week
    when: always
  allow_failure: true
  only:
    - main
    - develop
    - merge_requests

# Build applications
build_apps:
  stage: build
  dependencies:
    - install_dependencies
  script:
    - npm run build
  environment:
    variables:
{{#if_includes_frontend}}
      NEXT_PUBLIC_APP_NAME: "$ORGANIZATION_NAME"
      NEXT_PUBLIC_PRIMARY_COLOR: "$PRIMARY_COLOR"
      NEXT_PUBLIC_SECONDARY_COLOR: "$SECONDARY_COLOR"
{{/if_includes_frontend}}
      NODE_ENV: production
  artifacts:
    paths:
{{#if_includes_frontend}}
      - packages/frontend/.next/
      - packages/frontend/out/
{{/if_includes_frontend}}
{{#if_includes_backend}}
      - packages/backend/dist/
{{/if_includes_backend}}
    expire_in: 1 hour
  only:
    - main
    - develop

{{#if_deployment_docker}}
# Build Docker images
build_images:
  stage: containerize
  image: docker:24-dind
  services:
    - docker:24-dind
  dependencies:
    - build_apps
  before_script:
    - echo $DOCKER_REGISTRY_PASSWORD | docker login -u $DOCKER_REGISTRY_USER --password-stdin $DOCKER_REGISTRY
  script:
{{#if_includes_frontend}}
    # Build and push frontend image
    - cd packages/frontend
    - docker build 
        --build-arg NEXT_PUBLIC_APP_NAME="$ORGANIZATION_NAME"
        --build-arg NEXT_PUBLIC_PRIMARY_COLOR="$PRIMARY_COLOR" 
        --build-arg NEXT_PUBLIC_SECONDARY_COLOR="$SECONDARY_COLOR"
        -t $DOCKER_REGISTRY/$PROJECT_NAME-frontend:$CI_COMMIT_SHA
        -t $DOCKER_REGISTRY/$PROJECT_NAME-frontend:latest
        .
    - docker push $DOCKER_REGISTRY/$PROJECT_NAME-frontend:$CI_COMMIT_SHA
    - docker push $DOCKER_REGISTRY/$PROJECT_NAME-frontend:latest
    - cd ../..
{{/if_includes_frontend}}
{{#if_includes_backend}}
    # Build and push backend image
    - cd packages/backend
    - docker build 
        -t $DOCKER_REGISTRY/$PROJECT_NAME-backend:$CI_COMMIT_SHA
        -t $DOCKER_REGISTRY/$PROJECT_NAME-backend:latest
        .
    - docker push $DOCKER_REGISTRY/$PROJECT_NAME-backend:$CI_COMMIT_SHA  
    - docker push $DOCKER_REGISTRY/$PROJECT_NAME-backend:latest
    - cd ../..
{{/if_includes_backend}}
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: 1
  only:
    - main
{{/if_deployment_docker}}

{{#if_deployment_aws}}
# Deploy to AWS
deploy_aws:
  stage: deploy
  image: amazon/aws-cli:latest
  dependencies:
    - build_apps
{{#if_deployment_docker}}
    - build_images
{{/if_deployment_docker}}
  before_script:
    - yum install -y jq
    - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
    - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
    - aws configure set region $AWS_DEFAULT_REGION
  script:
    # Update ECS service
    - |
      aws ecs update-service \
        --cluster $PROJECT_NAME-cluster \
        --service $PROJECT_NAME-service \
        --force-new-deployment
    
    # Wait for deployment to complete
    - |
      aws ecs wait services-stable \
        --cluster $PROJECT_NAME-cluster \
        --services $PROJECT_NAME-service
  environment:
    name: production-aws
    url: https://$PROJECT_NAME.your-domain.com
  only:
    - main
{{/if_deployment_aws}}

{{#if_deployment_azure}}
# Deploy to Azure
deploy_azure:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  dependencies:
    - build_apps
{{#if_deployment_docker}}
    - build_images  
{{/if_deployment_docker}}
  before_script:
    - az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_CLIENT_SECRET --tenant $AZURE_TENANT_ID
  script:
    # Deploy to Azure Container Apps
    - |
      az containerapp update \
        --name $PROJECT_NAME \
        --resource-group $PROJECT_NAME-rg \
        --image $DOCKER_REGISTRY/$PROJECT_NAME:$CI_COMMIT_SHA
  environment:
    name: production-azure
    url: https://$PROJECT_NAME.azurecontainerapps.io
  only:
    - main
{{/if_deployment_azure}}

{{#if_deployment_gcp}}
# Deploy to Google Cloud
deploy_gcp:
  stage: deploy
  image: google/cloud-sdk:alpine
  dependencies:
    - build_apps
{{#if_deployment_docker}}
    - build_images
{{/if_deployment_docker}}
  before_script:
    - echo $GCP_SERVICE_ACCOUNT_KEY | base64 -d > gcp-key.json
    - gcloud auth activate-service-account --key-file gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    # Deploy to Cloud Run
    - |
      gcloud run deploy $PROJECT_NAME \
        --image gcr.io/$GCP_PROJECT_ID/$PROJECT_NAME:$CI_COMMIT_SHA \
        --platform managed \
        --region us-central1 \
        --allow-unauthenticated \
        --memory 1Gi \
        --cpu 1000m \
        --min-instances 1 \
        --max-instances 10
  environment:
    name: production-gcp
    url: https://$PROJECT_NAME-hash-uc.a.run.app
  after_script:
    - rm -f gcp-key.json
  only:
    - main
{{/if_deployment_gcp}}

# Deployment notification
notify_deployment:
  stage: notify
  dependencies: []
  script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        STATUS_EMOJI="✅"
        STATUS_COLOR="good"
      else
        STATUS_EMOJI="❌"
        STATUS_COLOR="danger"
      fi
      
      curl -X POST -H 'Content-type: application/json' \
        --data "{
          \"text\": \"$STATUS_EMOJI {{ORGANIZATION_NAME}} ICD-11 Application Deployment\",
          \"attachments\": [{
            \"color\": \"$STATUS_COLOR\",
            \"fields\": [{
              \"title\": \"Status\",
              \"value\": \"$CI_JOB_STATUS\",
              \"short\": true
            }, {
              \"title\": \"Commit\",
              \"value\": \"$CI_COMMIT_SHA\",
              \"short\": true  
            }, {
              \"title\": \"Branch\",
              \"value\": \"$CI_COMMIT_REF_NAME\", 
              \"short\": true
            }, {
              \"title\": \"Pipeline\",
              \"value\": \"$CI_PIPELINE_URL\",
              \"short\": false
            }]
          }]
        }" \
        $SLACK_WEBHOOK_URL
  when: always
  only:
    - main

# Manual jobs for specific environments
deploy_staging:
  extends: deploy_aws
  environment:
    name: staging-aws
    url: https://staging-$PROJECT_NAME.your-domain.com
  script:
    # Deploy to staging environment with different settings
    - |
      aws ecs update-service \
        --cluster $PROJECT_NAME-staging-cluster \
        --service $PROJECT_NAME-staging-service \
        --force-new-deployment
  when: manual
  only:
    - develop

# Database migration job (if needed)
{{#if_includes_backend}}
migrate_database:
  stage: deploy
  dependencies:
    - install_dependencies
  script:
    - cd packages/backend
    - npm run migration:run
  environment:
    variables:
      NODE_ENV: production
      DATABASE_URL: $PRODUCTION_DATABASE_URL
  when: manual
  only:
    - main
{{/if_includes_backend}}

# Cleanup job for old Docker images
cleanup_images:
  stage: deploy
  image: docker:24-dind
  services:
    - docker:24-dind
  script:
    - |
      # Keep only the latest 5 images
      docker images --format "table {{.Repository}}:{{.Tag}}\t{{.CreatedAt}}" \
        | grep $PROJECT_NAME \
        | tail -n +6 \
        | awk '{print $1}' \
        | xargs -r docker rmi
  when: manual
  allow_failure: true
  only:
    - main