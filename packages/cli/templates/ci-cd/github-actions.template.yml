# {{ORGANIZATION_NAME}} ICD-11 Healthcare Application
# GitHub Actions CI/CD Pipeline
# Generated by create-icd11-app

name: Deploy {{ORGANIZATION_NAME}} ICD-11 Application

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  ORGANIZATION_NAME: {{ORGANIZATION_NAME}}
  DEPLOYMENT_PROVIDER: {{DEPLOYMENT_PROVIDER}}

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    services:
{{#if_includes_redis}}
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
{{/if_includes_redis}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm run install:workspaces

{{#if_includes_backend}}
      - name: Backend Tests
        run: |
          cd packages/backend
          npm run test
          npm run test:e2e
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ICD11_CLIENT_ID: ${{ secrets.TEST_ICD11_CLIENT_ID }}
          ICD11_CLIENT_SECRET: ${{ secrets.TEST_ICD11_CLIENT_SECRET }}
{{/if_includes_backend}}

{{#if_includes_frontend}}
      - name: Frontend Tests
        run: |
          cd packages/frontend
          npm run test
          npm run type-check
{{/if_includes_frontend}}

      - name: Lint Code
        run: npm run lint

      - name: Build Applications
        run: npm run build
        env:
{{#if_includes_frontend}}
          NEXT_PUBLIC_APP_NAME: ${{ env.ORGANIZATION_NAME }}
          NEXT_PUBLIC_PRIMARY_COLOR: {{PRIMARY_COLOR}}
          NEXT_PUBLIC_SECONDARY_COLOR: {{SECONDARY_COLOR}}
{{/if_includes_frontend}}

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level moderate

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: typescript, javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

{{#if_deployment_docker}}
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

{{#if_includes_frontend}}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/{{PROJECT_NAME}}-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/{{PROJECT_NAME}}-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_NAME={{ORGANIZATION_NAME}}
            NEXT_PUBLIC_PRIMARY_COLOR={{PRIMARY_COLOR}}
            NEXT_PUBLIC_SECONDARY_COLOR={{SECONDARY_COLOR}}
{{/if_includes_frontend}}

{{#if_includes_backend}}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/{{PROJECT_NAME}}-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/{{PROJECT_NAME}}-backend:${{ github.sha }}
{{/if_includes_backend}}
{{/if_deployment_docker}}

{{#if_deployment_aws}}
  deploy-aws:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to ECS
        run: |
          # Update ECS service
          aws ecs update-service \
            --cluster {{PROJECT_NAME}}-cluster \
            --service {{PROJECT_NAME}}-service \
            --force-new-deployment
{{/if_deployment_aws}}

{{#if_deployment_azure}}
  deploy-azure:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: {{PROJECT_NAME}}
          resourceGroup: {{PROJECT_NAME}}-rg
          imageToDeploy: ${{ secrets.DOCKER_USERNAME }}/{{PROJECT_NAME}}:${{ github.sha }}
{{/if_deployment_azure}}

{{#if_deployment_gcp}}
  deploy-gcp:
    name: Deploy to Google Cloud
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy {{PROJECT_NAME}} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/{{PROJECT_NAME}}:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated
{{/if_deployment_gcp}}

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [test, security{{#if_deployment_docker}}, build-images{{/if_deployment_docker}}{{#if_deployment_aws}}, deploy-aws{{/if_deployment_aws}}{{#if_deployment_azure}}, deploy-azure{{/if_deployment_azure}}{{#if_deployment_gcp}}, deploy-gcp{{/if_deployment_gcp}}]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Send deployment notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          custom_payload: |
            {
              "text": "{{ORGANIZATION_NAME}} ICD-11 Application Deployment",
              "attachments": [{
                "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                "fields": [{
                  "title": "Status",
                  "value": "${{ job.status }}",
                  "short": true
                }, {
                  "title": "Commit", 
                  "value": "${{ github.sha }}",
                  "short": true
                }]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()