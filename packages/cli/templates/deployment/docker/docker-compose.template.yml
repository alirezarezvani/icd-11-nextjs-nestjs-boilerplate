# {{ORGANIZATION_NAME}} ICD-11 Healthcare Application
# Docker Compose Production Configuration
# Generated by create-icd11-app

version: '3.8'

services:
{{#if_includes_frontend}}
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_NAME={{ORGANIZATION_NAME}}
        - NEXT_PUBLIC_PRIMARY_COLOR={{PRIMARY_COLOR}}
        - NEXT_PUBLIC_SECONDARY_COLOR={{SECONDARY_COLOR}}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3003/api
      - NEXT_PUBLIC_APP_NAME={{ORGANIZATION_NAME}}
      - NODE_ENV=production
{{#if_includes_backend}}
    depends_on:
      - backend
{{/if_includes_backend}}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
{{/if_includes_frontend}}

{{#if_includes_backend}}
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - CORS_ORIGINS=http://frontend:3000,http://localhost:3000
      - ORG_NAME={{ORGANIZATION_NAME}}
{{#if_org_website}}
      - ORG_WEBSITE={{ORG_WEBSITE}}
{{/if_org_website}}
{{#if_support_email}}
      - SUPPORT_EMAIL={{SUPPORT_EMAIL}}
{{/if_support_email}}
{{#if_includes_redis}}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
{{else}}
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
{{/if_includes_redis}}
    env_file:
      - ./packages/backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
{{/if_includes_backend}}

{{#if_includes_redis}}
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
{{/if_includes_redis}}

{{#if_monitoring}}
  # Optional: Add monitoring with Prometheus and Grafana
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD={{GRAFANA_PASSWORD}}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
{{/if_monitoring}}

{{#if_includes_redis}}
volumes:
  redis_data:
    driver: local
{{/if_includes_redis}}
{{#if_monitoring}}
  grafana_data:
    driver: local
{{/if_monitoring}}

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16