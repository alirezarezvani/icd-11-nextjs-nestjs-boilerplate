# {{ORGANIZATION_NAME}} ICD-11 Healthcare Application
# Google Cloud Build Configuration
# Generated by create-icd11-app

steps:
  # Install dependencies
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['ci']
    dir: '.'

  # Run tests
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['run', 'test']
    dir: '.'
    env:
    - 'NODE_ENV=test'
{{#if_includes_redis}}
    - 'REDIS_HOST=localhost'
    - 'REDIS_PORT=6379'
{{/if_includes_redis}}
{{#if_who_credentials}}
    - 'ICD11_CLIENT_ID=${_WHO_CLIENT_ID}'
    - 'ICD11_CLIENT_SECRET=${_WHO_CLIENT_SECRET}'
{{/if_who_credentials}}

  # Security audit
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['audit', '--audit-level', 'moderate']
    dir: '.'

{{#if_includes_frontend}}
  # Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
    - 'build'
    - '--build-arg'
    - 'NEXT_PUBLIC_APP_NAME={{ORGANIZATION_NAME}}'
    - '--build-arg'
    - 'NEXT_PUBLIC_PRIMARY_COLOR={{PRIMARY_COLOR}}'
    - '--build-arg'
    - 'NEXT_PUBLIC_SECONDARY_COLOR={{SECONDARY_COLOR}}'
    - '-t'
    - 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-frontend:$COMMIT_SHA'
    - '-t'
    - 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-frontend:latest'
    - './packages/frontend'

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-frontend']
{{/if_includes_frontend}}

{{#if_includes_backend}}
  # Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
    - 'build'
    - '-t'
    - 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-backend:$COMMIT_SHA'
    - '-t'
    - 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-backend:latest'
    - './packages/backend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-backend']
{{/if_includes_backend}}

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
    - 'run'
    - 'services'
    - 'replace'
    - 'deployment/gcp/cloud-run.yaml'
    - '--region=us-central1'
    - '--platform=managed'
    env:
    - 'PROJECT_ID=$PROJECT_ID'

  # Update traffic to new revision
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
    - 'run'
    - 'services'
    - 'update-traffic'
    - '{{PROJECT_NAME}}'
    - '--to-latest'
    - '--region=us-central1'
    - '--platform=managed'

# Build configuration
options:
  # Use faster machine type
  machineType: 'E2_HIGHCPU_8'
  
  # Use Docker layer caching
  env:
  - 'DOCKER_BUILDKIT=1'
  
  # Logging configuration
  logging: CLOUD_LOGGING_ONLY
  
  # Disk size
  diskSizeGb: 20

# Build timeout (20 minutes)
timeout: '1200s'

# Environment substitutions
substitutions:
  # Organization branding
  _ORGANIZATION_NAME: '{{ORGANIZATION_NAME}}'
  _PRIMARY_COLOR: '{{PRIMARY_COLOR}}'
  _SECONDARY_COLOR: '{{SECONDARY_COLOR}}'
  
  # Cloud Run service configuration
  _SERVICE_REGION: 'us-central1'
  _MIN_INSTANCES: '1'
  _MAX_INSTANCES: '10'
  _MEMORY: '1Gi'
  _CPU: '1000m'
  
  # Application configuration
{{#if_org_website}}
  _ORG_WEBSITE: '{{ORG_WEBSITE}}'
{{/if_org_website}}
{{#if_support_email}}
  _SUPPORT_EMAIL: '{{SUPPORT_EMAIL}}'
{{/if_support_email}}
{{#if_who_credentials}}
  _WHO_CLIENT_ID: '{{WHO_CLIENT_ID}}'
  _WHO_CLIENT_SECRET: '{{WHO_CLIENT_SECRET}}'
{{/if_who_credentials}}

# Available build images
availableSecrets:
  secretManager:
{{#if_who_credentials}}
  - versionName: projects/$PROJECT_ID/secrets/who-client-id/versions/latest
    env: '_WHO_CLIENT_ID'
  - versionName: projects/$PROJECT_ID/secrets/who-client-secret/versions/latest
    env: '_WHO_CLIENT_SECRET'
{{/if_who_credentials}}
{{#if_includes_redis}}
  - versionName: projects/$PROJECT_ID/secrets/redis-password/versions/latest
    env: '_REDIS_PASSWORD'
{{/if_includes_redis}}

# Artifacts and images
images:
{{#if_includes_frontend}}
- 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-frontend:$COMMIT_SHA'
- 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-frontend:latest'
{{/if_includes_frontend}}
{{#if_includes_backend}}
- 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-backend:$COMMIT_SHA'
- 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-backend:latest'
{{/if_includes_backend}}

# Build artifacts
artifacts:
  images:
{{#if_includes_frontend}}
  - 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-frontend:$COMMIT_SHA'
{{/if_includes_frontend}}
{{#if_includes_backend}}
  - 'gcr.io/$PROJECT_ID/{{PROJECT_NAME}}-backend:$COMMIT_SHA'
{{/if_includes_backend}}