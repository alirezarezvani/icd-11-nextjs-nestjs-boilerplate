# {{ORGANIZATION_NAME}} ICD-11 Healthcare Application
# Google Cloud Run Deployment Configuration
# Generated by create-icd11-app

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: {{PROJECT_NAME}}
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/cpu-throttling: "false"
    run.googleapis.com/execution-environment: gen2
  labels:
    organization: "{{ORGANIZATION_NAME}}"
    app: "icd11-healthcare"
    template: "create-icd11-app"
spec:
  template:
    metadata:
      annotations:
        # Scaling configuration
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        
        # Resource allocation
        run.googleapis.com/memory: "1Gi"
        run.googleapis.com/cpu: "1000m"
        
        # Startup optimization
        run.googleapis.com/startup-cpu-boost: "true"
        
        # Network configuration
        run.googleapis.com/vpc-access-connector: "{{PROJECT_NAME}}-connector"
        run.googleapis.com/vpc-access-egress: "private-ranges-only"
    spec:
      serviceAccountName: "{{PROJECT_NAME}}-service-account"
      containerConcurrency: 100
      timeoutSeconds: 300
      containers:
{{#if_includes_frontend}}
      - name: frontend
        image: gcr.io/PROJECT_ID/{{PROJECT_NAME}}-frontend:latest
        ports:
        - name: http1
          containerPort: 3000
        env:
        - name: NEXT_PUBLIC_APP_NAME
          value: "{{ORGANIZATION_NAME}}"
        - name: NEXT_PUBLIC_PRIMARY_COLOR
          value: "{{PRIMARY_COLOR}}"
        - name: NEXT_PUBLIC_SECONDARY_COLOR
          value: "{{SECONDARY_COLOR}}"
        - name: NODE_ENV
          value: "production"
{{#if_includes_backend}}
        - name: NEXT_PUBLIC_API_URL
          value: "http://backend:3003/api"
{{/if_includes_backend}}
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
{{/if_includes_frontend}}
{{#if_includes_backend}}
      - name: backend
        image: gcr.io/PROJECT_ID/{{PROJECT_NAME}}-backend:latest
        ports:
        - name: http1
          containerPort: 3003
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3003"
        - name: ORG_NAME
          value: "{{ORGANIZATION_NAME}}"
{{#if_org_website}}
        - name: ORG_WEBSITE
          value: "{{ORG_WEBSITE}}"
{{/if_org_website}}
{{#if_support_email}}
        - name: SUPPORT_EMAIL
          value: "{{SUPPORT_EMAIL}}"
{{/if_support_email}}
{{#if_who_credentials}}
        - name: ICD11_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: who-api-credentials
              key: client_id
        - name: ICD11_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: who-api-credentials
              key: client_secret
{{/if_who_credentials}}
{{#if_includes_redis}}
        - name: REDIS_HOST
          value: "10.0.0.3"  # Private IP of Memorystore instance
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: password
{{/if_includes_redis}}
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
{{/if_includes_backend}}

---
# Service Account for Cloud Run
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: {{PROJECT_NAME}}-service-account
  annotations:
    cnrm.cloud.google.com/project-id: PROJECT_ID
spec:
  displayName: "{{ORGANIZATION_NAME}} ICD-11 Service Account"
  description: "Service account for {{ORGANIZATION_NAME}} ICD-11 healthcare application"

---
# IAM Policy Binding for Service Account
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: {{PROJECT_NAME}}-service-account-binding
spec:
  member: "serviceAccount:{{PROJECT_NAME}}-service-account@PROJECT_ID.iam.gserviceaccount.com"
  role: roles/run.invoker
  resourceRef:
    apiVersion: run.googleapis.com/v1
    kind: Service
    name: {{PROJECT_NAME}}

{{#if_includes_redis}}
---
# Memorystore Redis Instance
apiVersion: redis.cnrm.cloud.google.com/v1beta1
kind: RedisInstance
metadata:
  name: {{PROJECT_NAME}}-redis
  annotations:
    cnrm.cloud.google.com/project-id: PROJECT_ID
spec:
  displayName: "{{ORGANIZATION_NAME}} Redis Cache"
  tier: BASIC
  memorySizeGb: 1
  region: us-central1
  redisVersion: REDIS_7_0
  authEnabled: true
  transitEncryptionMode: SERVER_AUTHENTICATION
  authorizedNetwork: "projects/PROJECT_ID/global/networks/default"
  connectMode: PRIVATE_SERVICE_ACCESS

---
# Secret for Redis Password
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
type: Opaque
data:
  password: "REDIS_PASSWORD_BASE64_ENCODED"  # Replace with actual base64 encoded password
{{/if_includes_redis}}

{{#if_who_credentials}}
---
# Secret for WHO API Credentials
apiVersion: v1
kind: Secret
metadata:
  name: who-api-credentials
type: Opaque
data:
  client_id: "WHO_CLIENT_ID_BASE64_ENCODED"      # Replace with actual base64 encoded client ID
  client_secret: "WHO_CLIENT_SECRET_BASE64_ENCODED"  # Replace with actual base64 encoded client secret
{{/if_who_credentials}}

---
# VPC Connector for private network access
apiVersion: vpcaccess.cnrm.cloud.google.com/v1beta1
kind: VPCAccessConnector
metadata:
  name: {{PROJECT_NAME}}-connector
  annotations:
    cnrm.cloud.google.com/project-id: PROJECT_ID
spec:
  region: us-central1
  ipCidrRange: "10.8.0.0/28"
  minThroughput: 200
  maxThroughput: 300
  network: "projects/PROJECT_ID/global/networks/default"

---
# Cloud Build trigger for automated deployments
apiVersion: cloudbuild.cnrm.cloud.google.com/v1beta1
kind: CloudBuildTrigger
metadata:
  name: {{PROJECT_NAME}}-deploy-trigger
  annotations:
    cnrm.cloud.google.com/project-id: PROJECT_ID
spec:
  description: "Deploy {{ORGANIZATION_NAME}} ICD-11 application on main branch push"
  github:
    owner: "YOUR_GITHUB_USERNAME"  # Replace with actual GitHub username
    name: "{{PROJECT_NAME}}"       # Replace with actual repository name
    push:
      branch: "^main$"
  build:
    steps:
{{#if_includes_frontend}}
    # Build and push frontend image
    - name: 'gcr.io/cloud-builders/docker'
      args:
      - 'build'
      - '-t'
      - 'gcr.io/PROJECT_ID/{{PROJECT_NAME}}-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/PROJECT_ID/{{PROJECT_NAME}}-frontend:latest'
      - './packages/frontend'
    - name: 'gcr.io/cloud-builders/docker'
      args: ['push', '--all-tags', 'gcr.io/PROJECT_ID/{{PROJECT_NAME}}-frontend']
{{/if_includes_frontend}}
{{#if_includes_backend}}
    # Build and push backend image
    - name: 'gcr.io/cloud-builders/docker'
      args:
      - 'build'
      - '-t'
      - 'gcr.io/PROJECT_ID/{{PROJECT_NAME}}-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/PROJECT_ID/{{PROJECT_NAME}}-backend:latest'
      - './packages/backend'
    - name: 'gcr.io/cloud-builders/docker'
      args: ['push', '--all-tags', 'gcr.io/PROJECT_ID/{{PROJECT_NAME}}-backend']
{{/if_includes_backend}}
    # Deploy to Cloud Run
    - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
      entrypoint: gcloud
      args:
      - 'run'
      - 'services'
      - 'replace'
      - 'cloud-run.yaml'
      - '--region=us-central1'
      - '--platform=managed'
  timeout: '1200s'